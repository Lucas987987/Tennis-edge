name: Update Tennis Results

on:
  schedule:
    # Tourne chaque jour à 2h du matin UTC (3h ou 4h heure française)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Nécessaire pour pousser resultats.json
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Fetch tennis results
        run: python scripts/fetch_results.py
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultats.json
          git diff --staged --quiet || git commit -m "🎾 Mise à jour résultats $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
          
