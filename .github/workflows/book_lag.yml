name: Book Lag

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  book-lag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Decalage Unibet vs Pinnacle
        env:
          CLV_HISTORY: clv_history.jsonl
          BOOK_CURVES: book_curves.jsonl
          BOOK_LAG_REPORT: book_lag_report.json
          BOOK: unibet
        run: python scripts/book_lag.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add book_lag_report.json || true
          git diff --cached --quiet || git commit -m "book lag $(date -u +%FT%TZ)"
          git push || true
