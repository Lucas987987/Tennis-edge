name: Capture Closing Lines

on:
  # Le worker Cloudflare pilote la cadence (suivi toutes les ~3h + clôture rapprochée).
  repository_dispatch:
    types: [capture_closing]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture des cotes (OddsPapi)
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/capture_closing.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add closing_lines.json players_oddspapi.json matches_oddspapi.json active_tournaments.json odds_alerts_state.json odds_alerts_log.jsonl odds_logged_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Capture closing lines (OddsPapi)"
          git pull --rebase --autostash 2>/dev/null || true
          git push
