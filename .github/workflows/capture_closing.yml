name: Capture Closing Lines

on:
  # Worker Cloudflare en pause → le suivi tourne via cron quotidien.
  # 1×/jour suffit pour alimenter l'outil en cotes (pré-match). Le CLV vient
  # de l'historique gratuit (workflow séparé), pas d'ici.
  schedule:
    - cron: '30 6 * * *'      # 06h30 UTC, 1×/jour
  # Lancement manuel possible si tu veux rafraîchir ponctuellement
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Découverte des tournois + capture des cotes
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # --discover : rafraîchit aussi la liste des tournois actifs (1×/jour, idéal ici)
        run: python scripts/capture_closing.py --discover
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add closing_lines.json players_oddspapi.json matches_oddspapi.json active_tournaments.json odds_alerts_state.json odds_alerts_log.jsonl odds_logged_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Capture quotidienne (OddsPapi)"
          git pull --rebase --autostash 2>/dev/null || true
          git push
