name: Capture Closing Lines

# ──────────────────────────────────────────────────────────────────────────
# MODIFS :
#  1. CAPTURE_BOOKS=auto -> élargissement aux books FR (fr_books).
#  2. capture_closing.py écrit désormais live_odds.json (multi-books match+set1+set2).
#  3. build_live_curves.py accumule 3 fichiers de courbes live :
#       book_curves_live.jsonl / set1_curves_live.jsonl / set2_curves_live.jsonl
#  4. steam_alert tourne sur les 3 surfaces (live) à CHAQUE cycle -> alertes forward
#     match + set1 + set2, dédup par surface.
#  5. git add persiste les courbes live, live_odds.json et les 3 états d'alerte.
# ──────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [capture_closing]
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture des cotes (OddsPapi v5)
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CAPTURE_BOOKS: auto
        run: python scripts/capture_closing.py ${{ github.event_name == 'schedule' && '--discover' || github.event_name == 'workflow_dispatch' && '--extended' || '' }}
      - name: Courbes live + alertes forward (match + set1 + set2)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/build_live_curves.py
          CURVES=book_curves_live.jsonl MARKET=match python scripts/steam_alert.py || true
          CURVES=set1_curves_live.jsonl MARKET=set1 python scripts/steam_alert.py || true
          CURVES=set2_curves_live.jsonl MARKET=set2 python scripts/steam_alert.py || true
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add closing_lines.json capture_state.json players_oddspapi.json matches_oddspapi.json active_tournaments.json odds_alerts_state.json odds_alerts_log.jsonl odds_logged_state.json live_odds.json book_curves_live.jsonl set1_curves_live.jsonl set2_curves_live.jsonl steam_alert_state_match.json steam_alert_state_set1.json steam_alert_state_set2.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Capture cotes (OddsPapi $(date -u +%H:%MZ))"
          git pull --rebase --autostash 2>/dev/null || true
          git push
