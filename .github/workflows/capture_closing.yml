name: Capture Closing Lines

# ──────────────────────────────────────────────────────────────────────────
# DÉCLENCHEMENT : le worker Cloudflare (tennis-edge-closing) pilote la cadence
# (jour 5 min / nuit 15 min, ajustée au nb de tournois) et envoie un
# repository_dispatch `capture_closing`. C'est LE chemin principal.
# Le cron quotidien ci-dessous n'est qu'un FILET (worker en panne) et sert
# aussi de découverte quotidienne des tournois (--discover).
# ⚠️ Le commit DOIT inclure capture_state.json : c'est le marqueur que lit le
# worker pour savoir quand la dernière capture a tourné. Sans lui, le worker
# re-déclenche en boucle.
# ──────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [capture_closing]
  schedule:
    - cron: '30 6 * * *'      # filet quotidien + découverte tournois
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture des cotes (OddsPapi v5)
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # --discover seulement sur le cron quotidien ; les dispatches fréquents
        # s'appuient sur le rafraîchissement auto (>18h) pour économiser le quota.
        run: python scripts/capture_closing.py ${{ github.event_name == 'schedule' && '--discover' || '' }}
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add closing_lines.json capture_state.json players_oddspapi.json matches_oddspapi.json active_tournaments.json odds_alerts_state.json odds_alerts_log.jsonl odds_logged_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Capture cotes (OddsPapi $(date -u +%H:%MZ))"
          git pull --rebase --autostash 2>/dev/null || true
          git push
