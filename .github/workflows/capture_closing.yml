name: Capture Closing Lines

# ──────────────────────────────────────────────────────────────────────────
# MODIFS :
#  1. CAPTURE_BOOKS=auto -> élargissement aux books FR (fr_books).
#  2. Étape "Courbes live + alerte" : build_live_curves.py accumule les snapshots
#     multi-books (matches_oddspapi.json) en TRAJECTOIRES (book_curves_live.jsonl),
#     puis steam_alert (MARKET=match) alerte en FORWARD sur les matchs à venir.
#     -> C'est le chaînon qui rend les alertes live possibles, à chaque cycle.
#  3. git add inclut book_curves_live.jsonl + steam_alert_state_match.json
#     (sinon trajectoire perdue + dédup remise à zéro = spam).
# Surfaces set : pas encore en live (matches_oddspapi.json ne porte que le match) ;
# les alertes set1/set2 restent gérées par steam_pipeline.yml quand les courbes
# set live existeront (extension capture à venir).
# ──────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [capture_closing]
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture des cotes (OddsPapi v5)
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CAPTURE_BOOKS: auto
        run: python scripts/capture_closing.py ${{ github.event_name == 'schedule' && '--discover' || github.event_name == 'workflow_dispatch' && '--extended' || '' }}
      - name: Courbes live (match) + alerte forward
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CURVES: book_curves_live.jsonl
        run: |
          python scripts/build_live_curves.py
          MARKET=match python scripts/steam_alert.py || true
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add closing_lines.json capture_state.json players_oddspapi.json matches_oddspapi.json active_tournaments.json odds_alerts_state.json odds_alerts_log.jsonl odds_logged_state.json book_curves_live.jsonl steam_alert_state_match.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Capture cotes (OddsPapi $(date -u +%H:%MZ))"
          git pull --rebase --autostash 2>/dev/null || true
          git push
