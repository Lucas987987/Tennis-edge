name: Clean CLV metrics (one-shot)

# Nettoyage ponctuel : recalcule amplitude/min/max en pre-match uniquement, a partir
# des courbes deja stockees. Aucun appel API. A lancer manuellement (Run workflow).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing       # ecrit clv_history.jsonl -> meme groupe que CLV/capture
  cancel-in-progress: false

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Nettoyage des metriques CLV (pre-match only, offline)
        run: python scripts/clean_clv_metrics.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clv_history.jsonl
          git diff --staged --quiet || git commit -m "Nettoyage metriques CLV (pre-match only)"
          git pull --rebase --autostash 2>/dev/null || true
          git push
