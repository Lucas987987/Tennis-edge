name: Discover Tournaments

on:
  schedule:
    - cron: '30 5 * * *'      # 1×/jour, 5h30 UTC (avant la journée de tennis)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing       # même groupe que le suivi (évite l'écriture simultanée)
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Découverte des tournois ATP/WTA actifs
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: python scripts/capture_closing.py --discover
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add active_tournaments.json closing_lines.json players_oddspapi.json matches_oddspapi.json odds_alerts_state.json odds_alerts_log.jsonl odds_logged_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Discover tournaments + capture"
          git pull --rebase --autostash 2>/dev/null || true
          git push
