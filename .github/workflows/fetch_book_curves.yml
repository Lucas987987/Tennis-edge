name: Fetch Book Curves

on:
  workflow_dispatch:
  schedule:
    - cron: '45 23 * * *'

permissions:
  contents: write

jobs:
  fetch-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Courbes books (Pinnacle + mous) via historical v5
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          # pinnacle INCLUS : soft_open_detector compare le mou au sharp (pinnacle)
          BOOKS: pinnacle,unibet,bwin,betsson
        run: python scripts/fetch_book_curves.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add book_curves.jsonl || true
          git diff --cached --quiet || git commit -m "book curves v5 $(date -u +%FT%TZ)"
          git pull --rebase --autostash 2>/dev/null || true
          git push || true
