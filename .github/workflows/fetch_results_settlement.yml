name: Fetch Results (settlement, fast)

on:
  schedule:
    - cron: '30 22 * * *'   # 22h30 UTC : après la journée de matchs (et après Fetch CLV)
    - cron: '0 16 * * *'    # 16h UTC : récupère les matchs du matin/début d'aprem déjà finis
  workflow_dispatch:
    inputs:
      retry_false:
        description: 'Re-tenter les set1/set2 marques indispo (apres correction de bug)'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: tennis-results       # sérialise avec les autres écritures de résultats
  cancel-in-progress: false

jobs:
  settlement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Résultats rapides via /settlement (OddsPapi v5)
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RETRY_FALSE: ${{ github.event.inputs.retry_false || '0' }}
          # FINISHED_AFTER_H: '4'        # marge avant de considérer un match fini
          # MAX_SETTLEMENT_CALLS: '60'   # plafond d'appels par run
        run: python scripts/fetch_results_settlement.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultats_oddspapi.json backtest_tennis.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Résultats rapides (settlement v5)"
          git pull --rebase --autostash 2>/dev/null || true
          git push
