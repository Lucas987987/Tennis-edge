name: Health Check

on:
  schedule:
    - cron: '37 7 * * *'        # 1×/jour, minute 37 pour éviter la congestion
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run health check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY_1: ${{ secrets.ODDS_API_KEY_1 }}
          ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
          ODDS_API_KEY_3: ${{ secrets.ODDS_API_KEY_3 }}
          ODDS_API_KEY_4: ${{ secrets.ODDS_API_KEY_4 }}
          ODDS_API_KEY_5: ${{ secrets.ODDS_API_KEY_5 }}
          ODDS_API_KEY_6: ${{ secrets.ODDS_API_KEY_6 }}
          GH_OWNER: Lucas987987
          GH_REPO: Tennis-edge
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/health_check.py

