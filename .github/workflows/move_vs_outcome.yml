name: Move vs Outcome

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-outcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test de sur-correction (mouvement vs resultat)
        env:
          CLV_HISTORY: clv_history.jsonl
          RESULTS: resultats.json
          MOVE_OUTCOME_REPORT: move_outcome_report.json
        run: python scripts/move_vs_outcome.py
      - name: Commit du rapport
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add move_outcome_report.json || true
          git diff --cached --quiet || git commit -m "move/outcome $(date -u +%FT%TZ)"
          git push || true
