name: Opening Value

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  opening-value:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ouvertures molles - gagne-t-on vraiment ?
        env:
          CLV_HISTORY: clv_history.jsonl
          BOOK_CURVES: book_curves.jsonl
          RESULTS: resultats.json
          OPENING_VALUE_REPORT: opening_value_report.json
        run: python scripts/opening_value.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add opening_value_report.json || true
          git diff --cached --quiet || git commit -m "opening value $(date -u +%FT%TZ)"
          git push || true
