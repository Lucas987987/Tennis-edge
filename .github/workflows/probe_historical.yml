name: Probe historical-odds

# Lancement MANUEL (onglet Actions -> Run workflow).
# Imprime le payload brut OddsPapi /historical-odds d'UN match pour voir si les
# points in-play portent un état (score/set/minute). Lis le résultat directement
# dans le log de l'exécution.
#
# Pré-requis : scripts/probe_historical.py + secret RAPIDAPI_KEY.

on:
  workflow_dispatch:
    inputs:
      fixture_id:
        description: "fixtureId OddsPapi (depuis book_curves.jsonl / matches_oddspapi.json ; match TERMINÉ avec du live)"
        required: true
      bookmakers:
        description: "Slugs (3 max), séparés par des virgules"
        default: "bwin,unibet,betsson"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sonde historical-odds
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIXTURE_ID: ${{ github.event.inputs.fixture_id }}
          BOOKMAKERS: ${{ github.event.inputs.bookmakers }}
        run: python scripts/probe_historical.py
