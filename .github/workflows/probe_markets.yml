name: Probe markets

# Lancement MANUEL. Étiquette les marchés d'un match : sépare pré-match vs
# in-play, repère le candidat 'set 2' par son instant d'activation (~+40 min
# = fin du set 1). Résultat dans le log.
# Pré-requis : scripts/probe_markets.py + secret ODDSPAPI_KEY.

on:
  workflow_dispatch:
    inputs:
      fixture_id:
        description: "fixtureId OddsPapi (match terminé avec du live)"
        required: true
      commence:
        description: "commence_time (ISO) — laisse vide : récupéré auto depuis book_curves.jsonl"
        required: false
        default: ""
      bookmakers:
        description: "Slugs (3 max)"
        default: "bwin,unibet,betsson"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Étiqueter les marchés
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          FIXTURE_ID: ${{ github.event.inputs.fixture_id }}
          COMMENCE: ${{ github.event.inputs.commence }}
          BOOKMAKERS: ${{ github.event.inputs.bookmakers }}
        run: python scripts/probe_markets.py
