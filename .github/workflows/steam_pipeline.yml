name: Steam Pipeline (alertes + journal CLV/ROI)

# ──────────────────────────────────────────────────────────────────────────
# Enchaîne, sur les 3 surfaces (match / set1 / set2) :
#   1. fetch_set_results.py  -> set_results.json (résultats de set, 1 req/match fini)
#   2. steam_alert.py        -> alertes Telegram "MISER ICI" (dédup par surface)
#   3. paper_journal.py      -> journal forward CLV + ROI (persiste par surface)
# Puis COMMIT des états/journaux/résultats (sinon dédup remise à zéro = spam,
# et journal jamais accumulé).
#
# ⚠️ FORWARD : steam_alert n'alerte que sur des matchs À VENIR présents dans les
# courbes. Tant que la capture ne fournit pas de courbes multi-books de matchs à
# venir, ce pipeline construit surtout le track record / journal sur le passé.
# Pour une estimation immédiate sur l'historique : lancer manuellement avec
# BACKFILL=1 (voir workflow_dispatch input ci-dessous).
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      backfill:
        description: "1 = rejouer tout l'historique (estimation, ne persiste pas le journal)"
        default: "0"
  schedule:
    - cron: '15 0 * * *'      # après fetch_book_curves (23:45)

permissions:
  contents: write

concurrency:
  group: steam-pipeline
  cancel-in-progress: false

jobs:
  steam:
    runs-on: ubuntu-latest
    env:
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BACKFILL: ${{ github.event.inputs.backfill || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Résultats de set (set1/set2)
        run: python scripts/fetch_set_results.py || true

      - name: Alertes steam — match
        run: MARKET=match python scripts/steam_alert.py || true
      - name: Alertes steam — set 1
        run: MARKET=set1 python scripts/steam_alert.py || true
      - name: Alertes steam — set 2
        run: MARKET=set2 python scripts/steam_alert.py || true

      - name: Journal paper-trading — match
        run: MARKET=match python scripts/paper_journal.py || true
      - name: Journal paper-trading — set 1
        run: MARKET=set1 python scripts/paper_journal.py || true
      - name: Journal paper-trading — set 2
        run: MARKET=set2 python scripts/paper_journal.py || true

      - name: Commit états + journaux + résultats
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add set_results.json \
                  steam_alert_state_match.json steam_alert_state_set1.json steam_alert_state_set2.json \
                  paper_trades_match.jsonl paper_trades_set1.jsonl paper_trades_set2.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "steam pipeline $(date -u +%FT%TZ)"
          git pull --rebase --autostash 2>/dev/null || true
          git push || true
