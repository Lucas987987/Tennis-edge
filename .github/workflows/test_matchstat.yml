name: Test Matchstat
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TEST_DATE: '2026-06-04'
        run: python scripts/test_matchstat.py
