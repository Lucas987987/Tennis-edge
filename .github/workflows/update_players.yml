name: Update Players Data

on:
  schedule:
    # Tourne chaque lundi à 3h UTC (après le weekend qui a souvent des tournois)
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update players Elo and stats
        run: python scripts/update_players.py

      - name: Commit and push players data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players_data.json
          git diff --staged --quiet || git commit -m "🎾 Mise à jour joueurs Elo $(date -u '+%Y-%m-%d')"
          git push
