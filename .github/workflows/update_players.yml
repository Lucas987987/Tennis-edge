name: Update Players Data

# CORRECTIF v2 : raw.githubusercontent.com ET api.github.com renvoient 404 depuis
# le runner (probable restriction d'egress : github.com OK pour le checkout, mais
# domaines de contenu GitHub bloqués). Parade : CLONER les repos Sackmann via
# github.com (joignable) et lire les CSV en LOCAL. Le script tombe sur ces fichiers
# locaux en priorité (SACKMANN_ATP / SACKMANN_WTA), sinon repli raw/api.

on:
  schedule:
    - cron: '0 3 * * 1'          # chaque lundi 3h UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cloner les données Sackmann (via github.com, contourne raw/api)
        run: |
          git clone --depth 1 https://github.com/JeffSackmann/tennis_atp.git /tmp/satp
          git clone --depth 1 https://github.com/JeffSackmann/tennis_wta.git /tmp/swta
          echo "--- fichiers ATP récupérés ---"; ls /tmp/satp/*.csv | head

      - name: Update players Elo and stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SACKMANN_ATP: /tmp/satp
          SACKMANN_WTA: /tmp/swta
        run: python scripts/update_players.py

      - name: Commit and push players data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players_data.json
          git diff --staged --quiet || git commit -m "🎾 Mise à jour joueurs Elo $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash 2>/dev/null || true
          git push
