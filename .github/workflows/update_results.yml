name: Update Tennis Results

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch tennis results and enrich backtest
        run: python scripts/fetch_results.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultats.json backtest_tennis.csv || true
          git diff --staged --quiet || git commit -m "🎾 Mise à jour résultats $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
