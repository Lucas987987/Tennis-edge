name: Update Results Fast
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,17 * * *'
jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/fetch_results_fast.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_tennis.csv
          git diff --staged --quiet || git commit -m "🎾 Résultats rapides (API) $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
