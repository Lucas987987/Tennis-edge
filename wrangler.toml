# ─────────────────────────────────────────────────────────────────────────────
# Config du worker Cloudflare Tennis Edge.
# ⚠️  Mets "name" EXACTEMENT au nom de ton worker existant (sinon Cloudflare en
#     crée un nouveau au lieu de mettre à jour le tien). Tu le vois dans le
#     dashboard Cloudflare > Workers.
# ─────────────────────────────────────────────────────────────────────────────
name = "tennis-edge-worker"          # <-- METS ICI LE NOM DE TON WORKER ACTUEL
main = "worker.js"
compatibility_date = "2025-06-01"

# Le worker se réveille toutes les 2 min ; il décide lui-même s'il déclenche une
# capture selon la cadence jour/nuit, et n'envoie un repository_dispatch que si besoin.
[triggers]
crons = ["*/2 * * * *"]

[vars]
GH_OWNER = "Lucas987987"
GH_REPO  = "Tennis-edge"

# Cadence (en minutes) — règle tout ici, pas besoin de toucher worker.js :
DAY_CADENCE_MIN   = 5     # 1 point / 5 min le jour (dense, pour voir l'évolution en direct)
NIGHT_CADENCE_MIN = 15    # 1 point / 15 min la nuit (moins de points)
NIGHT_START_UTC   = 23    # début de la "nuit" en UTC (~01h heure de France l'été)
NIGHT_END_UTC     = 6     # fin de la "nuit" en UTC  (~08h heure de France l'été)

# NB : ces cadences sont les valeurs quand peu de tournois tournent (coût = 1 req/capture).
# S'il y a beaucoup de tournois simultanés, le worker ESPACE automatiquement la cadence
# pour garder le même budget mensuel (jamais de dépassement de quota).

# GH_TOKEN n'est PAS ici : c'est un SECRET (déjà configuré sur ton worker). Ne le mets
# jamais en clair. Si besoin de le (re)créer : dashboard > ton worker > Settings >
# Variables and Secrets > add secret "GH_TOKEN".
